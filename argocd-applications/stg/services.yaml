apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talk-services-stg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_GITOPS_REPO_URL
    targetRevision: main
    path: services/overlays/azure-stg
  destination:
    server: https://kubernetes.default.svc
    namespace: talk-stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
