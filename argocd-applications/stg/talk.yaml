apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talk-stg
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sofoniascode/talk-gitops.git
    targetRevision: main
    path: chart/talk
    helm:
      valueFiles:
        - ../../chart/values-stg.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: talk-stg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
