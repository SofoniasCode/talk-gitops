apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talk-gateway-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sofoniascode/talk-gitops.git
    targetRevision: main
    path: gateway/overlays/azure-dev
  destination:
    server: https://kubernetes.default.svc
    namespace: talk-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
