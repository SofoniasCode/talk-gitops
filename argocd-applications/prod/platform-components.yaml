apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talk-platform-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_GITOPS_REPO_URL
    targetRevision: main
    path: platform-components/overlays/azure-prod
  destination:
    server: https://kubernetes.default.svc
    namespace: talk-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
