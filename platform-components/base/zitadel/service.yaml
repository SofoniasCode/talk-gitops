apiVersion: v1
kind: Service
metadata:
  name: zitadel
  labels:
    app.kubernetes.io/name: zitadel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zitadel
  ports:
    - name: http
      port: 80
      targetPort: api
    - name: api
      port: 8080
      targetPort: api
    - name: login
      port: 3000
      targetPort: login
