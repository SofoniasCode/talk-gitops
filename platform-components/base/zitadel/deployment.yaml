apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  labels:
    app.kubernetes.io/name: zitadel
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zitadel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zitadel
    spec:
      volumes:
        - name: bootstrap
          emptyDir: {}
      initContainers:
        - name: init-schema
          image: ghcr.io/zitadel/zitadel:v4.11.0
          imagePullPolicy: IfNotPresent
          command: ["/app/zitadel"]
          args:
            - init
            - schema
          env:
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-dsn
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-host
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-port
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_SSL_MODE
              value: disable
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_EXISTINGDATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
      containers:
        - name: api
          image: ghcr.io/zitadel/zitadel:v4.11.0
          imagePullPolicy: IfNotPresent
          command: ["/app/zitadel"]
          args:
            - start-from-setup
            - --masterkey
            - $(ZITADEL_MASTERKEY)
          ports:
            - name: api
              containerPort: 8080
          env:
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: masterkey
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-dsn
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-host
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-port
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_SSL_MODE
              value: disable
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_EXISTINGDATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_PORT
              value: "8080"
            - name: ZITADEL_EXTERNALDOMAIN
              value: zitadel.localhost
            - name: ZITADEL_EXTERNALPORT
              value: "80"
            - name: ZITADEL_EXTERNALSECURE
              value: "false"
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
              value: admin
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: admin-password
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME
              value: Talk
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME
              value: Admin
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS
              value: admin@zitadel.localhost
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED
              value: "true"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_PATPATH
              value: /zitadel/bootstrap/admin-service.pat
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME
              value: admin-service
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME
              value: Talk Admin Service
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE
              value: "2027-01-01T00:00:00Z"
            - name: ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH
              value: /zitadel/bootstrap/login-client.pat
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME
              value: login-client
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME
              value: Automatically Initialized IAM_LOGIN_CLIENT
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE
              value: "2027-01-01T00:00:00Z"
            - name: ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED
              value: "true"
            - name: ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI
              value: http://zitadel.localhost/ui/v2/login/
            - name: ZITADEL_OIDC_DEFAULTLOGINURLV2
              value: http://zitadel.localhost/ui/v2/login/login?authRequest=
            - name: ZITADEL_OIDC_DEFAULTLOGOUTURLV2
              value: http://zitadel.localhost/ui/v2/login/logout?post_logout_redirect=
            - name: ZITADEL_SAML_DEFAULTLOGINURLV2
              value: http://zitadel.localhost/ui/v2/login/login?samlRequest=
          volumeMounts:
            - name: bootstrap
              mountPath: /zitadel/bootstrap
          readinessProbe:
            exec:
              command: ["/app/zitadel", "ready"]
            initialDelaySeconds: 20
            periodSeconds: 10
        - name: login
          image: ghcr.io/zitadel/zitadel-login:v4.11.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: login
              containerPort: 3000
          env:
            - name: ZITADEL_API_URL
              value: http://localhost:8080
            - name: NEXT_PUBLIC_BASE_PATH
              value: /ui/v2/login
            - name: ZITADEL_SERVICE_USER_TOKEN_FILE
              value: /zitadel/bootstrap/login-client.pat
            - name: CUSTOM_REQUEST_HEADERS
              value: Host:zitadel.localhost,X-Forwarded-Proto:http
          volumeMounts:
            - name: bootstrap
              mountPath: /zitadel/bootstrap
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ui/v2/login/healthy
              port: login
            initialDelaySeconds: 20
            periodSeconds: 10
