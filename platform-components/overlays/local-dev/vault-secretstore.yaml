apiVersion: v1
kind: Secret
metadata:
  name: talk-vault-token
  namespace: external-secrets
type: Opaque
stringData:
  # Local dev only. Match this to your host Vault token.
  token: root
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: talk-hashicorp-vault
spec:
  provider:
    vault:
      server: http://host.docker.internal:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: talk-vault-token
          namespace: external-secrets
          key: token
