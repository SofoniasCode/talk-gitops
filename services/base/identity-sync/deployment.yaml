apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-sync
  labels:
    app.kubernetes.io/name: identity-sync
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-sync
    spec:
      containers:
        - name: identity-sync
          image: ghcr.io/talk/identity-sync:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
            - name: ZITADEL_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: identity-sync-zitadel
                  key: webhook-signing-key
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
