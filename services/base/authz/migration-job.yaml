apiVersion: batch/v1
kind: Job
metadata:
  name: authz-migrate
  labels:
    app.kubernetes.io/name: authz
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authz
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/talk/authz:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.db.migrations"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
