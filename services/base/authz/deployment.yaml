apiVersion: apps/v1
kind: Deployment
metadata:
  name: authz
  labels:
    app.kubernetes.io/name: authz
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: authz
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authz
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/talk/authz:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.db.migrations"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
      containers:
        - name: authz
          image: ghcr.io/talk/authz:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
