apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-api
  labels:
    app.kubernetes.io/name: console-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: console-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console-api
    spec:
      containers:
        - name: console-api
          image: ghcr.io/talk/console-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: console-api-config
            - secretRef:
                name: console-api-zitadel-admin
                optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
