apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: console-api-zitadel-admin
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-hashicorp-vault
  target:
    name: console-api-zitadel-admin
    creationPolicy: Owner
  data:
    - secretKey: ZITADEL_BASE_URL
      remoteRef:
        key: talk/local/console-api/zitadel-admin
        property: base-url
    - secretKey: ZITADEL_ADMIN_TOKEN
      remoteRef:
        key: talk/local/console-api/zitadel-admin
        property: admin-token
    - secretKey: ZITADEL_API_HOST_HEADER
      remoteRef:
        key: talk/local/console-api/zitadel-admin
        property: api-host-header
    - secretKey: ZITADEL_PROJECT_ID
      remoteRef:
        key: talk/local/console-api/zitadel-admin
        property: project-id
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authz-database
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-hashicorp-vault
  target:
    name: authz-database
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: talk/local/authz/database
        property: database-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-sync-zitadel
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-hashicorp-vault
  target:
    name: identity-sync-zitadel
    creationPolicy: Owner
  data:
    - secretKey: webhook-signing-key
      remoteRef:
        key: talk/local/identity-sync/zitadel-webhook
        property: signing-key
