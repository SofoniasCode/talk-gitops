apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: console-api-zitadel-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-azure-key-vault
  target:
    name: console-api-zitadel-admin
    creationPolicy: Owner
  data:
    - secretKey: ZITADEL_BASE_URL
      remoteRef:
        key: talk-dev-zitadel-issuer-url
    - secretKey: ZITADEL_ADMIN_TOKEN
      remoteRef:
        key: talk-dev-zitadel-admin-token
    - secretKey: ZITADEL_API_HOST_HEADER
      remoteRef:
        key: talk-dev-zitadel-api-host-header
    - secretKey: ZITADEL_PROJECT_ID
      remoteRef:
        key: talk-dev-zitadel-project-id
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authz-database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-azure-key-vault
  target:
    name: authz-database
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: talk-dev-authz-database-url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-sync-zitadel
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-azure-key-vault
  target:
    name: identity-sync-zitadel
    creationPolicy: Owner
  data:
    - secretKey: webhook-signing-key
      remoteRef:
        key: talk-dev-identity-sync-zitadel-webhook-signing-key
