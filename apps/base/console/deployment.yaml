apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-web
  labels:
    app.kubernetes.io/name: console-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: console-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console-web
    spec:
      containers:
        - name: console-web
          image: ghcr.io/talk/console-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
