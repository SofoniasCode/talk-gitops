## Values for azure-stg environment
## Usage: helm install talk ./chart/talk -n talk-stg -f chart/values-stg.yaml
## Generate from Terraform: terraform output -raw helm_values_yaml > chart/values-stg.yaml

global:
  environment: stg
  domain: talk.REPLACE.example.com
  zitadelDomain: zitadel.REPLACE.example.com
  adminEmail: admin@example.com

tls:
  enabled: true
  clusterIssuer: letsencrypt-prod

registry:
  server: REPLACE.azurecr.io

externalSecrets:
  keyVaultUrl: https://REPLACE.vault.azure.net/
  workloadIdentity:
    clientId: REPLACE
    tenantId: REPLACE

apps:
  consoleWeb:
    image:
      tag: latest
  adminWeb:
    image:
      tag: latest

services:
  authz:
    image:
      tag: latest
  consoleApi:
    image:
      tag: latest
  identitySync:
    image:
      tag: latest
