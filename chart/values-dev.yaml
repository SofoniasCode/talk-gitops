## Values for azure-dev environment
## Usage: helm install talk ./chart/talk -n talk-dev -f chart/values-dev.yaml

global:
  environment: dev
  baseDomain: dev.telodev.com
  domains:
    admin: admin.dev.telodev.com
    agents: agents.dev.telodev.com
    console: console.dev.telodev.com
    zitadel: zitadel.dev.telodev.com
    webhooks: webhooks.dev.telodev.com
  adminEmail: admin@telodev.com

tls:
  enabled: true
  clusterIssuer: letsencrypt-prod
  wildcard:
    enabled: true
    clusterIssuer: letsencrypt-prod-dns01
    secretName: talk-dev-wildcard-tls

certManager:
  dns01:
    enabled: true
    clusterIssuerName: letsencrypt-prod-dns01
    azure:
      subscriptionId: 5440e535-65a4-42c9-a742-f3817bd29fde
      resourceGroup: talk-dev-rg
      tenantId: 9865568e-ab2b-4e9e-844e-b8047f9babda
      clientId: f9ef3263-8acf-4e76-ae82-bcc377421778
      hostedZoneName: dev.telodev.com

externalDns:
  enabled: true
  domainFilter: dev.telodev.com
  azure:
    subscriptionId: 5440e535-65a4-42c9-a742-f3817bd29fde
    resourceGroup: talk-dev-rg
    tenantId: 9865568e-ab2b-4e9e-844e-b8047f9babda
    clientId: 6ab77f16-8629-4712-ae9c-2e67f812c664

registry:
  server: talkdevacr.azurecr.io

externalSecrets:
  keyVaultUrl: https://talk-dev-vault.vault.azure.net/
  workloadIdentity:
    clientId: 15656477-0f53-44b8-9cd2-955bb4ef69ef
    tenantId: 9865568e-ab2b-4e9e-844e-b8047f9babda

oauth2Proxy:
  # Envoy Gateway data-plane Service ClusterIP. Lets the proxies reach Zitadel
  # without hairpinning off the cluster's own public LoadBalancer IP, which
  # AKS blocks. Updated automatically by `make post`.
  hostAliases:
    - ip: 10.2.239.86
      hostnames:
        - zitadel.dev.telodev.com
  tiers:
    public:
      enabled: true
      # Rotate after moving public login to the customer-login org so stale
      # public sessions created through the operator policy are not reused.
      cookieName: _talk_public_customer
      # Customer-facing login context. Its login policy has only
      # Microsoft (Customer) attached.
      zitadelOrgId: "373219150450917395"
      # Customer IdP is selected by the customer-login org policy above.
      microsoftIdpId: ""
    console:
      enabled: true
      # Rotate after changing operator access policy so stale customer-auth
      # Console sessions cannot continue using an old browser cookie.
      cookieName: _talk_console_operator
      # Set after configure-zitadel-microsoft-idp.sh prints "Operator IdP ID".
      microsoftIdpId: "373212733602005011"
      # Staff Console is private: only the operator's current network can
      # reach console.dev.telodev.com. Update this CIDR when working from a
      # different network, or replace with VPN/office/Tailscale CIDRs.
      ipAllowlist:
        - 31.42.144.170/32

# Path-based bookmarks (talk.dev.telodev.com/admin etc.) are no longer
# redirected. Re-enable temporarily if a future migration needs the same
# transitional behavior.
legacyPathRedirects:
  enabled: false

apps:
  consoleWeb:
    image:
      tag: 55bbcf75de49f50493011049e4bc3d2ae31ffb9c
  adminWeb:
    image:
      tag: 55bbcf75de49f50493011049e4bc3d2ae31ffb9c
  agentsWeb:
    image:
      tag: 55bbcf75de49f50493011049e4bc3d2ae31ffb9c

services:
  authz:
    image:
      tag: 55bbcf75de49f50493011049e4bc3d2ae31ffb9c
  consoleApi:
    image:
      tag: 55bbcf75de49f50493011049e4bc3d2ae31ffb9c
    # Each frontend reaches console-api via /console-api/* on its own
    # subdomain (same origin, routed through the per-subdomain
    # oauth2-proxy), so no CORS configuration is needed.
  identitySync:
    image:
      tag: 55bbcf75de49f50493011049e4bc3d2ae31ffb9c
