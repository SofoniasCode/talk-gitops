## ── Cloud target ────────────────────────────────────────────────────
## Selects which cloud-specific platform templates to render
## (cert-manager Issuer, external-dns provider, ESO ClusterSecretStore,
## and ServiceAccount workload-identity annotations).
##
## Currently supported: azure
## Planned:             aws
cloud: azure

## ── Global ──────────────────────────────────────────────────────────
global:
  environment: dev            # dev | stg | prod — used as Key Vault prefix
  baseDomain: example.com     # the env's DNS zone, e.g. dev.example.com
  # Per-product subdomains. When unset they default to <key>.<baseDomain> via
  # the talk.host helper. Override if a product needs a different name.
  domains: {}
  # Legacy single-host fields. Kept so older values files still render until
  # they are migrated to baseDomain + domains.
  domain: ""
  zitadelDomain: ""
  adminEmail: admin@example.com

nameOverride: ""
fullnameOverride: ""

## ── TLS ─────────────────────────────────────────────────────────────
tls:
  enabled: true
  clusterIssuer: letsencrypt-prod
  # When enabled, the Gateway terminates a single wildcard cert for the env
  # and the per-host listeners + per-host certs are removed. Requires
  # certManager.dns01 to be configured.
  wildcard:
    enabled: false
    clusterIssuer: letsencrypt-prod-dns01
    secretName: talk-wildcard-tls

## ── cert-manager DNS-01 ─────────────────────────────────────────────
certManager:
  dns01:
    # When true, the chart owns the ClusterIssuer; otherwise it assumes one
    # already exists out-of-band (useful when Terraform installs the issuer).
    enabled: true
    clusterIssuerName: letsencrypt-prod-dns01
    acmeServer: https://acme-v02.api.letsencrypt.org/directory
    azure:
      subscriptionId: ""
      resourceGroup: ""
      tenantId: ""
      clientId: ""
      hostedZoneName: ""

## ── external-dns ────────────────────────────────────────────────────
externalDns:
  enabled: false
  image:
    repository: registry.k8s.io/external-dns/external-dns
    tag: v0.18.0
  domainFilter: ""
  policy: sync                # sync | upsert-only
  interval: 1m
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  azure:
    subscriptionId: ""
    resourceGroup: ""
    tenantId: ""
    clientId: ""

## ── Container Registry ─────────────────────────────────────────────
registry:
  server: myacr.azurecr.io

## ── External Secrets Operator ───────────────────────────────────────
externalSecrets:
  keyVaultUrl: https://my-vault.vault.azure.net/
  workloadIdentity:
    clientId: ""
    tenantId: ""

## ── Zitadel (auth platform) ────────────────────────────────────────
zitadel:
  image:
    repository: ghcr.io/zitadel/zitadel
    tag: v4.11.0
  loginImage:
    repository: ghcr.io/zitadel/zitadel-login
    tag: v4.11.0
  replicas: 1
  database:
    sslMode: require
  resources:
    api:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    login:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    initSchema:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  firstInstance:
    adminUsername: admin
    adminFirstName: Talk
    adminLastName: Admin
    adminPasswordChangeRequired: false
    patExpirationDate: "2027-01-01T00:00:00Z"
  # In-pod sidecar that captures the PATs Zitadel writes to its emptyDir on
  # first boot and materialises them into the `zitadel-bootstrap-pats`
  # Secret. Without this, a fresh install requires a manual one-time step
  # to create the Secret before `make post` (talk-infra) can authenticate.
  # Safe to leave on after bootstrap — the sidecar idles once the Secret
  # exists.
  bootstrapPats:
    captureEnabled: true
    # alpine/k8s ships a small POSIX shell + kubectl matching the cluster
    # version. rancher/kubectl is distroless (no /bin/sh) so the inline
    # script below would not run; bitnami/kubectl no longer publishes
    # versioned free tags. Override per-tenant if a private registry mirror
    # is required.
    image:
      repository: alpine/k8s
      tag: 1.34.7
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

## ── OAuth2 Proxy ────────────────────────────────────────────────────
# Two-tier deployment. The "public" tier covers customer-facing products
# (admin, agents, future transcribe) and shares one OIDC client + cookie
# scoped to the env's base domain so the customer signs in once. The
# "console" tier protects the staff Console with its own OIDC client, its
# own cookie, and an optional IP allowlist enforced at the Gateway.
oauth2Proxy:
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.15.2
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70
  # AKS hairpin workaround — populated automatically by `make post` after
  # Envoy Gateway provisions its data-plane Service. See REGENERATE.md.
  hostAliases: []
  tiers:
    public:
      enabled: true
      cookieName: _talk_public
      # When set, oauth2-proxy adds Zitadel's IdP-scoping OIDC scope so
      # customer-facing auth jumps directly to the customer Microsoft IdP.
      # Format: urn:zitadel:iam:org:idp:id:<idp-id>
      microsoftIdpId: ""
      # Optional Zitadel organization id whose login policy should handle
      # this tier. For the customer plane, point this at the dedicated
      # customer-login org that has only Microsoft (Customer) attached.
      # When set, the chart uses the org scope and does not add microsoftIdpId.
      zitadelOrgId: ""
      upstreams:
        - id: admin-web
          path: ^/admin/?(.*)$$
          rewriteTarget: /$1
          uri: http://admin-web:80
        - id: agents-web
          path: ^/agents/?(.*)$$
          rewriteTarget: /$1
          uri: http://agents-web:80
        - id: console-api
          path: ^/console-api/?(.*)$$
          rewriteTarget: /$1
          uri: http://console-api:8000
    console:
      enabled: true
      cookieName: _talk_console
      # Operator-plane Microsoft IdP. Set per environment after
      # configure-zitadel-microsoft-idp.sh prints "Operator IdP ID".
      microsoftIdpId: ""
      zitadelOrgId: ""
      ipAllowlist: []        # empty = no SecurityPolicy is created
      # Console authorization is enforced by Console/console-api via
      # citadel.* roles. oauth2-proxy v7.15 does not support an
      # --allowed-group flag, so it only authenticates the session here.
      upstreams:
        - id: console-web
          path: ^/console/?(.*)$$
          rewriteTarget: /$1
          uri: http://console-web:80
        - id: console-api
          path: ^/console-api/?(.*)$$
          rewriteTarget: /$1
          uri: http://console-api:8000

## ── Gateway ─────────────────────────────────────────────────────────
gateway:
  className: talk-envoy

## ── Legacy path-based routing (transitional) ────────────────────────
# When enabled the chart serves 301 redirects from /admin /agents /console
# on the legacy host to the new subdomains, so any bookmarks survive the
# cutover. Disable in a follow-up release.
legacyPathRedirects:
  enabled: false
  host: ""

## ── Applications (web frontends) ────────────────────────────────────
apps:
  consoleWeb:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
  adminWeb:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
  agentsWeb:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70

## ── Services (Python backends) ──────────────────────────────────────
services:
  authz:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
  consoleApi:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
    config:
      appEnv: production
      authzBaseUrl: http://authz:8000
      dependencyTimeoutSeconds: "5"
      # CORS allowed origins for browser calls from the per-product
      # subdomains. Computed defaults from global.domains in values-<env>.
      corsAllowedOrigins: []
    # Daily CronJob that runs the audit retention worker. Today this is a
    # no-op (in-memory ring buffer is implicitly bounded by deque size).
    # Once the audit store moves to Postgres, the same CronJob deletes
    # rows older than auditRetention.retentionDays.
    auditRetention:
      enabled: true
      schedule: "0 3 * * *"
      retentionDays: 365
  identitySync:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
