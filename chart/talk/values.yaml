## ── Global ──────────────────────────────────────────────────────────
global:
  environment: dev            # dev | stg | prod — used as Key Vault prefix
  domain: talk.example.com    # main app hostname
  zitadelDomain: zitadel.example.com
  adminEmail: admin@example.com

nameOverride: ""
fullnameOverride: ""

## ── TLS ─────────────────────────────────────────────────────────────
tls:
  enabled: true
  clusterIssuer: letsencrypt-prod

## ── Container Registry ─────────────────────────────────────────────
registry:
  server: myacr.azurecr.io

## ── External Secrets Operator ───────────────────────────────────────
externalSecrets:
  keyVaultUrl: https://my-vault.vault.azure.net/
  workloadIdentity:
    clientId: ""
    tenantId: ""

## ── Zitadel (auth platform) ────────────────────────────────────────
zitadel:
  image:
    repository: ghcr.io/zitadel/zitadel
    tag: v4.11.0
  loginImage:
    repository: ghcr.io/zitadel/zitadel-login
    tag: v4.11.0
  replicas: 1
  database:
    sslMode: require
  resources:
    api:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    login:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    initSchema:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
  firstInstance:
    adminUsername: admin
    adminFirstName: Talk
    adminLastName: Admin
    adminPasswordChangeRequired: false
    patExpirationDate: "2027-01-01T00:00:00Z"

## ── OAuth2 Proxy ────────────────────────────────────────────────────
oauth2Proxy:
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.15.2
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPU: 70

## ── Gateway ─────────────────────────────────────────────────────────
gateway:
  className: talk-envoy

## ── Applications (web frontends) ────────────────────────────────────
apps:
  consoleWeb:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
  adminWeb:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70

## ── Services (Python backends) ──────────────────────────────────────
services:
  authz:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
  consoleApi:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
    config:
      appEnv: production
      authzBaseUrl: http://authz:8000
      dependencyTimeoutSeconds: "5"
  identitySync:
    image:
      tag: latest
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 70
