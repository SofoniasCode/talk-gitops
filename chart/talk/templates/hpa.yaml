{{- if .Values.services.authz.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: authz
  labels:
    app.kubernetes.io/name: authz
    {{- include "talk.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: authz
  minReplicas: {{ .Values.services.authz.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.services.authz.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.authz.autoscaling.targetCPU }}
{{- end }}
