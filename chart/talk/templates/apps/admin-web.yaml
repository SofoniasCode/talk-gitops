apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-web
  labels:
    app.kubernetes.io/name: admin-web
    {{- include "talk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.apps.adminWeb.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-web
    spec:
      containers:
        - name: admin-web
          image: {{ .Values.registry.server }}/talk/admin-web:{{ .Values.apps.adminWeb.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: admin-web
  labels:
    app.kubernetes.io/name: admin-web
    {{- include "talk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: admin-web
  ports:
    - name: http
      port: 80
      targetPort: http
