{{- /*
  Daily CronJob that runs the audit retention worker.

  Today the worker is a no-op against the in-memory ring buffer (see
  talk/services/console-api/src/app/scripts/audit_retention.py) — bound is
  enforced by the deque size, not by date. Shipping the CronJob now means
  the operational surface (RBAC, image, retention env var) is already in
  place when the Postgres-backed store lands; flipping the worker over
  becomes a single-line Python change.
*/ -}}
{{- if .Values.services.consoleApi.auditRetention.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: console-api-audit-retention
  labels:
    app.kubernetes.io/name: console-api-audit-retention
    {{- include "talk.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.services.consoleApi.auditRetention.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: console-api-audit-retention
            {{- include "talk.labels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: audit-retention
              image: {{ .Values.registry.server }}/talk/console-api:{{ .Values.services.consoleApi.image.tag }}
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - app.scripts.audit_retention
              envFrom:
                - configMapRef:
                    name: console-api-config
                - secretRef:
                    name: console-api-zitadel-admin
                    optional: true
              env:
                - name: TALK_CONSOLE_API_AUDIT_RETENTION_DAYS
                  value: {{ .Values.services.consoleApi.auditRetention.retentionDays | quote }}
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
{{- end }}
