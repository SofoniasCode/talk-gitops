apiVersion: v1
kind: ConfigMap
metadata:
  name: console-api-config
  labels:
    app.kubernetes.io/name: console-api
    {{- include "talk.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.services.consoleApi.config.appEnv }}
  AUTHZ_BASE_URL: {{ .Values.services.consoleApi.config.authzBaseUrl }}
  DEPENDENCY_TIMEOUT_SECONDS: {{ .Values.services.consoleApi.config.dependencyTimeoutSeconds | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-api
  labels:
    app.kubernetes.io/name: console-api
    {{- include "talk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.services.consoleApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: console-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console-api
    spec:
      containers:
        - name: console-api
          image: {{ .Values.registry.server }}/talk/console-api:{{ .Values.services.consoleApi.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: console-api-config
            - secretRef:
                name: console-api-zitadel-admin
                optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: console-api
  labels:
    app.kubernetes.io/name: console-api
    {{- include "talk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: console-api
  ports:
    - name: http
      port: 8000
      targetPort: http
