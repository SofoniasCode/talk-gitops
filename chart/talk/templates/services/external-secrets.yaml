apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: console-api-zitadel-admin
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-azure-key-vault
  target:
    name: console-api-zitadel-admin
    creationPolicy: Owner
  data:
    - secretKey: ZITADEL_BASE_URL
      remoteRef:
        key: {{ include "talk.kvKey" (list $ "zitadel" "issuer-url") }}
    - secretKey: ZITADEL_ADMIN_TOKEN
      remoteRef:
        key: {{ include "talk.kvKey" (list $ "zitadel" "admin-token") }}
    - secretKey: ZITADEL_API_HOST_HEADER
      remoteRef:
        key: {{ include "talk.kvKey" (list $ "zitadel" "api-host-header") }}
    - secretKey: ZITADEL_PROJECT_ID
      remoteRef:
        key: {{ include "talk.kvKey" (list $ "zitadel" "project-id") }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authz-database
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-azure-key-vault
  target:
    name: authz-database
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ include "talk.kvKey" (list $ "authz" "database-url") }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: identity-sync-zitadel
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-azure-key-vault
  target:
    name: identity-sync-zitadel
    creationPolicy: Owner
  data:
    - secretKey: webhook-signing-key
      remoteRef:
        key: {{ include "talk.kvKey" (list $ "identity-sync" "zitadel-webhook-signing-key") }}
