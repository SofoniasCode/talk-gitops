apiVersion: apps/v1
kind: Deployment
metadata:
  name: authz
  labels:
    app.kubernetes.io/name: authz
    {{- include "talk.labels" . | nindent 4 }}
spec:
  {{- if not .Values.services.authz.autoscaling.enabled }}
  replicas: {{ .Values.services.authz.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: authz
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authz
    spec:
      initContainers:
        - name: migrate
          image: {{ .Values.registry.server }}/talk/authz:{{ .Values.services.authz.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.db.migrations"]
          resources:
            {{- toYaml .Values.services.authz.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
      containers:
        - name: authz
          image: {{ .Values.registry.server }}/talk/authz:{{ .Values.services.authz.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          resources:
            {{- toYaml .Values.services.authz.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: authz
  labels:
    app.kubernetes.io/name: authz
    {{- include "talk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: authz
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authz-migrate
  labels:
    app.kubernetes.io/name: authz
    app.kubernetes.io/component: migration
    {{- include "talk.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
    helm.sh/hook-weight: "0"
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authz
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ .Values.registry.server }}/talk/authz:{{ .Values.services.authz.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "app.db.migrations"]
          resources:
            {{- toYaml .Values.services.authz.resources | nindent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: authz-database
                  key: database-url
