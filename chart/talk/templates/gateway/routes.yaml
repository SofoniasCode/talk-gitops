            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: identity-sync
          port: 8000
{{ if .Values.legacyPathRedirects.enabled }}
---
{{/* ---------- transitional: redirect old paths on the legacy host ---------- */ -}}
{{- $legacyHost := .Values.legacyPathRedirects.host -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: legacy-admin-redirect
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ $legacyHost }}
  parentRefs:
    - name: talk-public-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: {{ include "talk.host" (list $ "admin") }}
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
            statusCode: 301
---
