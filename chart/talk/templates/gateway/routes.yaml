{{- /*
Per-subdomain routing. Each product owns one subdomain that funnels through
its tier's oauth2-proxy. The proxy handles the OIDC dance under /oauth2/* and
forwards everything else to the product's internal Service after the Gateway
rewrites the path prefix to match the proxy's upstream config.

Order matters in HTTPRoute rules: more specific path matches must come first
so /oauth2 and /console-api are not accidentally captured by the catch-all.
*/ -}}

{{- /* ---------- admin.<base> (public tier) ---------- */ -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admin-web-route
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ include "talk.host" (list $ "admin") }}
  parentRefs:
    - name: talk-public-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: oauth2-proxy-public
          port: 4180
    - matches:
        - path:
            type: PathPrefix
            value: /console-api
      backendRefs:
        - name: oauth2-proxy-public
          port: 4180
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /admin
      backendRefs:
        - name: oauth2-proxy-public
          port: 4180
---
