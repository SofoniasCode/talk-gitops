apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-proxy-route
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  {{- if .Values.tls.enabled }}
  hostnames:
    - {{ .Values.global.domain }}
  {{- end }}
  parentRefs:
    - name: talk-public-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: oauth2-proxy
          port: 4180
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: console-trailing-slash-redirect
  labels:
    {{- include "talk.labels" . | nindent 4 }}
spec:
  {{- if .Values.tls.enabled }}
  hostnames:
    - {{ .Values.global.domain }}
  {{- end }}
  parentRefs:
    - name: talk-public-gateway
  rules:
    - matches:
        - path:
            type: Exact
            value: /console
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /console/
            statusCode: 302
---
