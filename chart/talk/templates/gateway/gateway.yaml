apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: talk-public-gateway
  labels:
    {{- include "talk.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer }}
    {{- end }}
    {{- if and .Values.externalDns.enabled (or .Values.tls.wildcard.enabled .Values.global.baseDomain) }}
    external-dns.alpha.kubernetes.io/hostname: {{ printf "%s,%s,%s,%s" (include "talk.host" (list $ "admin")) (include "talk.host" (list $ "agents")) (include "talk.host" (list $ "console")) (include "talk.host" (list $ "zitadel")) | quote }}
    {{- end }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: talk-envoy-proxy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    {{- if .Values.tls.enabled }}
    {{- if .Values.tls.wildcard.enabled }}
    - name: https-wildcard
      protocol: HTTPS
      port: 443
      hostname: {{ include "talk.publicWildcardHostname" . | quote }}
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.tls.wildcard.secretName }}
    {{- else }}
    - name: https-zitadel
      protocol: HTTPS
      port: 443
      hostname: {{ include "talk.host" (list $ "zitadel") }}
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: zitadel-{{ .Values.global.environment }}-tls
    - name: https-talk
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.global.domain }}
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: talk-{{ .Values.global.environment }}-tls
    {{- end }}
    {{- end }}
