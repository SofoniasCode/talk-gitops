apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  labels:
    {{- include "talk.labels" . | nindent 4 }}
data:
  alpha-config.yaml: |
    server:
      bindAddress: 0.0.0.0:4180
    upstreamConfig:
      upstreams:
        - id: console-web
          path: ^/console/?(.*)$$
          rewriteTarget: /$1
          uri: http://console-web:80
        - id: admin-web
          path: ^/admin/?(.*)$$
          rewriteTarget: /$1
          uri: http://admin-web:80
        - id: console-api
          path: ^/console-api/?(.*)$$
          rewriteTarget: /$1
          uri: http://console-api:8000
    providers:
      - id: zitadel
        provider: oidc
        clientID: "${OAUTH2_PROXY_CLIENT_ID}"
        clientSecret: "${OAUTH2_PROXY_CLIENT_SECRET}"
        scope: "openid email profile urn:zitadel:iam:user:resourceowner"
        oidcConfig:
          issuerURL: "${OAUTH2_PROXY_OIDC_ISSUER_URL}"
          insecureSkipIssuerVerification: ${OAUTH2_PROXY_INSECURE_SKIP_ISSUER_VERIFICATION}
          userIDClaim: sub
          groupsClaim: urn:talk:roles
        profileURL: "${OAUTH2_PROXY_OIDC_ISSUER_URL}/oidc/v1/userinfo"
        additionalClaims:
          - urn:talk:organization_id
          - urn:talk:roles
    injectRequestHeaders:
      - name: X-Talk-Subject-Id
        values:
          - claimSource:
              claim: user
      - name: X-Talk-Organization-Id
        values:
          - claimSource:
              claim: urn:talk:organization_id
      - name: X-Talk-Roles
        values:
          - claimSource:
              claim: groups
      - name: Authorization
        values:
          - claimSource:
              claim: access_token
              prefix: "Bearer "
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    {{- include "talk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.oauth2Proxy.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: {{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}
          imagePullPolicy: IfNotPresent
          args:
            - --alpha-config=/etc/oauth2-proxy/alpha-config.yaml
            - --proxy-prefix=/oauth2
            - --redirect-url=$(OAUTH2_PROXY_REDIRECT_URL)
            - --email-domain=*
            - --skip-provider-button=true
            - --reverse-proxy=true
            - --cookie-name=_talk_oauth2_proxy
            - --cookie-secure=$(OAUTH2_PROXY_COOKIE_SECURE)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --cookie-samesite=lax
            - --cookie-domain=$(OAUTH2_PROXY_COOKIE_DOMAIN)
            - --whitelist-domain=$(OAUTH2_PROXY_WHITELIST_DOMAIN)
          ports:
            - name: http
              containerPort: 4180
          envFrom:
            - secretRef:
                name: oauth2-proxy-oidc
          volumeMounts:
            - name: config
              mountPath: /etc/oauth2-proxy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
      volumes:
        - name: config
          configMap:
            name: oauth2-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  labels:
    app.kubernetes.io/name: oauth2-proxy
    {{- include "talk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
