apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel
  labels:
    app.kubernetes.io/name: zitadel
    {{- include "talk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.zitadel.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: zitadel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zitadel
    spec:
      volumes:
        - name: bootstrap
          emptyDir: {}
        - name: bootstrap-pats
          secret:
            secretName: zitadel-bootstrap-pats
            optional: true
      initContainers:
        - name: init-schema
          image: {{ .Values.zitadel.image.repository }}:{{ .Values.zitadel.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["/app/zitadel"]
          args:
            - init
            - schema
          resources:
            {{- toYaml .Values.zitadel.resources.initSchema | nindent 12 }}
          env:
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-dsn
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-host
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-port
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: {{ .Values.zitadel.database.sslMode | quote }}
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
              value: {{ .Values.zitadel.database.sslMode | quote }}
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_EXISTINGDATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-password
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-password
      containers:
        - name: api
          image: {{ .Values.zitadel.image.repository }}:{{ .Values.zitadel.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["/app/zitadel"]
          args:
            - start-from-setup
            - --masterkey
            - $(ZITADEL_MASTERKEY)
          ports:
            - name: api
              containerPort: 8080
          resources:
            {{- toYaml .Values.zitadel.resources.api | nindent 12 }}
          env:
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: masterkey
            - name: ZITADEL_DATABASE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-dsn
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-host
            - name: ZITADEL_DATABASE_POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-port
            - name: ZITADEL_DATABASE_POSTGRES_DATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE
              value: {{ .Values.zitadel.database.sslMode | quote }}
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE
              value: {{ .Values.zitadel.database.sslMode | quote }}
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_EXISTINGDATABASE
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-name
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-password
            - name: ZITADEL_DATABASE_POSTGRES_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-user
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: database-password
            - name: ZITADEL_PORT
              value: "8080"
            - name: ZITADEL_EXTERNALDOMAIN
              value: {{ .Values.global.zitadelDomain }}
            - name: ZITADEL_EXTERNALPORT
              value: {{ if .Values.tls.enabled }}"443"{{ else }}"80"{{ end }}
            - name: ZITADEL_EXTERNALSECURE
              value: {{ .Values.tls.enabled | quote }}
            - name: ZITADEL_TLS_ENABLED
              value: "false"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME
              value: {{ .Values.zitadel.firstInstance.adminUsername }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zitadel-config
                  key: admin-password
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME
              value: {{ .Values.zitadel.firstInstance.adminFirstName }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME
              value: {{ .Values.zitadel.firstInstance.adminLastName }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS
              value: {{ .Values.global.adminEmail }}
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED
              value: "true"
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED
              value: {{ .Values.zitadel.firstInstance.adminPasswordChangeRequired | quote }}
            - name: ZITADEL_FIRSTINSTANCE_PATPATH
              value: /zitadel/bootstrap/admin-service.pat
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME
              value: admin-service
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME
              value: Talk Admin Service
            - name: ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE
              value: {{ .Values.zitadel.firstInstance.patExpirationDate | quote }}
            - name: ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH
              value: /zitadel/bootstrap/login-client.pat
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME
              value: login-client
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME
              value: Automatically Initialized IAM_LOGIN_CLIENT
            - name: ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE
              value: {{ .Values.zitadel.firstInstance.patExpirationDate | quote }}
            - name: ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED
              value: "true"
            {{- $scheme := ternary "https" "http" .Values.tls.enabled }}
            - name: ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI
              value: {{ $scheme }}://{{ .Values.global.zitadelDomain }}/ui/v2/login/
            - name: ZITADEL_OIDC_DEFAULTLOGINURLV2
              value: {{ $scheme }}://{{ .Values.global.zitadelDomain }}/ui/v2/login/login?authRequest=
            - name: ZITADEL_OIDC_DEFAULTLOGOUTURLV2
              value: {{ $scheme }}://{{ .Values.global.zitadelDomain }}/ui/v2/login/logout?post_logout_redirect=
            - name: ZITADEL_SAML_DEFAULTLOGINURLV2
              value: {{ $scheme }}://{{ .Values.global.zitadelDomain }}/ui/v2/login/login?samlRequest=
          volumeMounts:
            - name: bootstrap
              mountPath: /zitadel/bootstrap
          readinessProbe:
            exec:
              command: ["/app/zitadel", "ready"]
            initialDelaySeconds: 20
            periodSeconds: 10
        - name: login
          image: {{ .Values.zitadel.loginImage.repository }}:{{ .Values.zitadel.loginImage.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: login
              containerPort: 3000
          resources:
            {{- toYaml .Values.zitadel.resources.login | nindent 12 }}
          env:
            - name: CUSTOM_REQUEST_HEADERS
              value: Host:{{ .Values.global.zitadelDomain }},X-Forwarded-Proto:{{ $scheme }}
            - name: ZITADEL_API_URL
              value: http://localhost:8080
            - name: NEXT_PUBLIC_BASE_PATH
              value: /ui/v2/login
            - name: ZITADEL_SERVICE_USER_TOKEN_FILE
              value: /zitadel/pats/login-client.pat
          volumeMounts:
            - name: bootstrap-pats
              mountPath: /zitadel/pats
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ui/v2/login/healthy
              port: login
            initialDelaySeconds: 20
            periodSeconds: 10
