apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-oidc
spec:
  refreshInterval: 15s
  secretStoreRef:
    kind: ClusterSecretStore
    name: talk-hashicorp-vault
  target:
    name: oauth2-proxy-oidc
    creationPolicy: Owner
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: client-id
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: client-secret
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: cookie-secret
    - secretKey: OAUTH2_PROXY_OIDC_ISSUER_URL
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: issuer-url
    - secretKey: OAUTH2_PROXY_REDIRECT_URL
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: redirect-url
    - secretKey: OAUTH2_PROXY_COOKIE_DOMAIN
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: cookie-domain
    - secretKey: OAUTH2_PROXY_WHITELIST_DOMAIN
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: whitelist-domain
    - secretKey: OAUTH2_PROXY_COOKIE_SECURE
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: cookie-secure
    - secretKey: OAUTH2_PROXY_INSECURE_SKIP_ISSUER_VERIFICATION
      remoteRef:
        key: talk/local/oauth2-proxy/oidc
        property: insecure-skip-issuer-verification
